spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:ThisIsAVerySecureSecretKeyForEcommerceShopApi2024!!}
  expiration: 86400000

logging:
  level:
    com.ecommerce.shop_api: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:your_cloud_name}
  api_key: ${CLOUDINARY_API_KEY:your_api_key}
  api_secret: ${CLOUDINARY_API_SECRET:your_api_secret}
